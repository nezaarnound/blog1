<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog1 - Modern Blog Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div id="navbar-container"></div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Welcome to <span class="highlight">Blog1</span></h1>
                <p>Share your thoughts, read amazing stories, and connect with readers worldwide</p>
                <div class="hero-buttons">
                    <a href="pages/register.html" class="btn btn-primary">Get Started</a>
                    <a href="#posts" class="btn btn-outline">Explore Posts</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Posts Section -->
    <section id="posts" class="posts-section">
        <div class="container">
            <div class="section-header">
                <h2><i class="fas fa-newspaper"></i> Latest Posts</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search posts..." autocomplete="off">
                    <button onclick="searchPosts()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>
            <div class="posts-grid" id="postsGrid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading posts...
                </div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Developed with <i class="fas fa-heart"></i> by NEZA_ARNOUND</p>
            <p>&copy; 2024 Blog1. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/posts.js"></script>
    <script src="js/navbar.js"></script>
    <script>
        // Global variables
        let currentPage = 1;
        let currentSearch = '';
        
        // Initialize page when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Home page loaded');
            
            // Load navbar
            if (typeof loadNavbar === 'function') {
                loadNavbar();
            } else {
                console.error('loadNavbar function not found');
            }
            
            // Load posts
            if (typeof loadPosts === 'function') {
                loadPosts();
            } else {
                console.error('loadPosts function not found');
                const postsGrid = document.getElementById('postsGrid');
                if (postsGrid) {
                    postsGrid.innerHTML = '<div class="loading error">Error: Posts function not available. Please refresh the page.</div>';
                }
            }
            
            // Check auth and update UI
            if (typeof checkAuthAndUpdateUI === 'function') {
                checkAuthAndUpdateUI();
            }
            
            // Search on Enter key
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        searchPosts();
                    }
                });
            }
        });
        
        // Search posts function
        function searchPosts() {
            const input = document.getElementById('searchInput');
            if (input) {
                currentSearch = input.value;
                currentPage = 1;
                if (typeof loadPosts === 'function') {
                    loadPosts(currentPage, currentSearch);
                } else {
                    console.error('loadPosts function not found');
                }
            }
        }
        
        // Change page function
        function changePage(page) {
            currentPage = page;
            if (typeof loadPosts === 'function') {
                loadPosts(currentPage, currentSearch);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                console.error('loadPosts function not found');
            }
        }
        
        // Make functions globally available
        window.searchPosts = searchPosts;
        window.changePage = changePage;
    </script>


<!-- Floating Chat Button -->
<div class="chat-floating-btn" onclick="window.location.href='pages/chat.html'">
    <i class="fas fa-comment-dots"></i>
    <span id="floatingChatBadge" class="chat-floating-badge" style="display: none;">0</span>
</div>

<script>
function updateFloatingBadge() {
    const badge = document.getElementById('floatingChatBadge');
    const unread = localStorage.getItem('unreadMessages') || 0;
    if (badge) {
        if (unread > 0) {
            badge.textContent = unread;
            badge.style.display = 'flex';
        } else {
            badge.style.display = 'none';
        }
    }
}
setInterval(updateFloatingBadge, 3000);
updateFloatingBadge();
</script>
</body>
</html>
